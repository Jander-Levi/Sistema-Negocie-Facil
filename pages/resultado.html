<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Débitos - NegociaFácil</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="icon" type="image/png" href="https://intranet.g2gsistemas.com.br/arquivos_publicos//logo_g2g.png">
</head>
<body>
    <header>
        <a href="../index.html" class="logo"><img src="https://intranet.g2gsistemas.com.br/arquivos_publicos//logo_g2g.png" alt="Logo" style="height: 30px; margin-right: 10px; vertical-align: middle;">NegociaFácil</a>
        <nav>
            <a href="#" id="btnSair" class="btn btn-outline">Sair</a>
        </nav>
    </header>

    <main class="container">
        <h2 style="color: var(--cor-principal); margin-bottom: 20px;">Olá, <span id="nomeCliente"></span></h2>
        <p style="margin-bottom: 20px;">Estes são os débitos vinculados ao seu CPF. Selecione quais deseja negociar.</p>

        <div class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <!-- INÍCIO ÁREA EDITÁVEL - CABEÇALHO DA TABELA -->
                        <th>Selecionar</th>
                        <th>Descrição</th>
                        <th>Vencimento Original</th>
                        <th>Valor Original</th>
                        <th>Valor Atualizado</th>
                        <!-- FIM ÁREA EDITÁVEL -->
                    </tr>
                </thead>
                <tbody id="tabelaDebitosBody">
                    <!-- Preenchido via JavaScript -->
                </tbody>
            </table>
        </div>

        <div style="text-align: right; margin-top: 20px;">
            <p style="font-size: 1.2rem; margin-bottom: 15px;">Total Selecionado: <strong>R$ <span id="totalSelecionado">0,00</span></strong></p>
            <button id="btnAvancarNegociacao" class="btn" style="padding: 15px 30px; font-size: 1.1rem; display: none;">Avançar para Negociação</button>
        </div>

        <div id="secaoAcordos" style="display: none; margin-top: 40px;">
            <h2 style="color: var(--cor-principal); margin-bottom: 20px;">Minhas Solicitações de Acordo</h2>
            <div class="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Valor Total</th>
                            <th>Forma Pag.</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAcordosBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../data/db.js"></script>
    <script src="../scripts/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof UIResultados !== 'undefined') {
                UIResultados.init();
            }
        });
    </script>
</body>
</html>
